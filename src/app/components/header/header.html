<header>
    <div class="conteiner">
        <h1>Project-EVE</h1>
        <img src="assets/logo-mini.png" alt="Aperos-icon" width="100" height="100" class="imgLogo">
        <div class="imgC">
            <img src="assets/user-icon.png" alt="User-icon" width="25" class="User-icon" (click)="toggleLogin()">
            <p>{{UserName}}</p>

        </div>

    <div class="Menu">
        <button>Home</button>
        <button>Sobre</button>

    </div>
}
@if (isLoggedIn) {
    <app-login/>
}
